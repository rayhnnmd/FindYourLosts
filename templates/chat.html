<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Chat | FindYourLosts</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Playfair+Display:ital,wght@0,700;1,700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#FF6B4A",
                        "background-light": "#FEF6F1",
                        "background-dark": "#0B1F3F",
                        navy: { 900: "#0B1F3F", 800: "#1A2E4C", 700: "#2A3D59", }
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                        sans: ["Inter", "sans-serif"],
                    },
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        .material-symbols-outlined { vertical-align: middle; }
        /* Hide scrollbar for cleaner chat */
        #messages-container::-webkit-scrollbar { width: 6px; }
        #messages-container::-webkit-scrollbar-track { background: transparent; }
        #messages-container::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
    </style>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark text-navy-900 dark:text-gray-100 min-h-screen transition-colors duration-300 font-sans flex flex-col">
    <nav class="flex flex-none items-center justify-between px-6 py-4 border-b border-orange-100 dark:border-navy-800 bg-white/50 dark:bg-navy-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <a href="/item/{{ item.id }}" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-navy-800 transition-colors inline-flex items-center text-slate-500 dark:text-slate-400">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center shrink-0">
                    <span class="material-symbols-outlined text-primary">person</span>
                </div>
                <div>
                    <h2 class="font-bold text-navy-900 dark:text-white leading-tight">
                        {{ other_user.name }}
                    </h2>
                    <p class="text-xs text-slate-500 dark:text-slate-400 leading-tight">
                        Regarding <span class="font-semibold">{{ item.title }}</span>
                    </p>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <button id="theme-toggle" class="flex items-center justify-center text-navy-700 dark:text-gray-300 hover:text-primary transition-colors">
                <span class="material-symbols-outlined text-2xl dark:hidden">dark_mode</span>
                <span class="material-symbols-outlined text-2xl hidden dark:block">light_mode</span>
            </button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col max-w-4xl w-full mx-auto p-4 sm:p-6 pb-24 h-full relative">
        <div id="messages-container" class="flex-1 overflow-y-auto flex flex-col gap-4 mb-4 pb-4 px-2">
            <!-- Messages fetched via JS -->
            <div class="text-center py-8">
                <span class="material-symbols-outlined text-4xl text-slate-300 dark:text-slate-600 animate-spin">sync</span>
                <p class="text-sm text-slate-400 mt-2">Loading messages...</p>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light dark:bg-background-dark border-t border-orange-100 dark:border-navy-800 z-10">
            <div class="max-w-4xl mx-auto">
                <form id="chat-form" class="flex items-end gap-3">
                    <div class="flex-1 relative bg-white dark:bg-navy-900 rounded-3xl border border-slate-200 dark:border-navy-700 shadow-sm focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20 transition-all overflow-hidden">
                        <textarea id="message-input" rows="1" class="w-full max-h-32 bg-transparent border-none px-5 py-4 focus:ring-0 resize-none text-navy-900 dark:text-white placeholder:text-slate-400" placeholder="Message {{ other_user.name }}..."></textarea>
                    </div>
                    <button type="submit" id="send-button" class="w-14 h-14 shrink-0 rounded-full bg-primary hover:bg-orange-600 text-white flex items-center justify-center shadow-md shadow-primary/30 transition-transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span class="material-symbols-outlined ml-1">send</span>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script>
        // Adjust textarea height automatically
        const messageInput = document.getElementById('message-input');
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if (this.value.trim() !== '') {
                document.getElementById('send-button').disabled = false;
            } else {
                document.getElementById('send-button').disabled = true;
            }
        });

        // Submit on enter (no shift)
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('chat-form').dispatchEvent(new Event('submit'));
            }
        });

        const currentUserId = {{ session['user_id'] }};
        const itemId = {{ item.id }};
        const otherUserId = {{ other_user.id }};
        const container = document.getElementById('messages-container');
        let lastMessageId = 0;
        let isFirstLoad = true;

        async function fetchMessages() {
            try {
                const res = await fetch(`/api/messages/${itemId}/${otherUserId}`);
                if (!res.ok) throw new Error("Failed to fetch messages");
                const messages = await res.json();
                
                if (isFirstLoad) {
                    container.innerHTML = '';
                    if (messages.length === 0) {
                        container.innerHTML = `
                            <div class="text-center py-10 mt-10">
                                <div class="w-20 h-20 mx-auto bg-slate-100 dark:bg-navy-800 rounded-full flex items-center justify-center mb-4">
                                    <span class="material-symbols-outlined text-4xl text-slate-400">forum</span>
                                </div>
                                <h3 class="text-lg font-bold text-navy-900 dark:text-white">Start a conversation</h3>
                                <p class="text-sm text-slate-500 mt-1">Messages are private</p>
                            </div>
                        `;
                    }
                    isFirstLoad = false;
                }

                let addedNew = false;
                messages.forEach(msg => {
                    if (msg.id > lastMessageId) {
                        lastMessageId = msg.id;
                        addedNew = true;
                        
                        // Remove empty state if present
                        const emptyState = container.querySelector('.text-center');
                        if (emptyState && !emptyState.closest('.message-bubble')) emptyState.remove();

                        const isMine = msg.sender_id === currentUserId;
                        
                        const msgDiv = document.createElement('div');
                        msgDiv.className = `flex w-full ${isMine ? 'justify-end' : 'justify-start'}`;
                        
                        // Format time (HH:MM AM/PM)
                        const date = new Date(msg.created_at);
                        const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                        msgDiv.innerHTML = `
                            <div class="max-w-[80%] md:max-w-[70%] message-bubble">
                                <div class="px-5 py-3 rounded-2xl ${isMine ? 'bg-primary text-white rounded-br-sm' : 'bg-white dark:bg-navy-800 border border-slate-100 dark:border-navy-700 text-navy-900 dark:text-gray-100 rounded-bl-sm'} shadow-sm">
                                    <p class="whitespace-pre-wrap break-words text-[15px] sm:text-base">${escapeHTML(msg.body)}</p>
                                </div>
                                <p class="text-[11px] text-slate-400 mt-1 px-1 ${isMine ? 'text-right' : 'text-left'}">${timeStr}</p>
                            </div>
                        `;
                        container.appendChild(msgDiv);
                    }
                });

                if (addedNew) {
                    scrollToBottom();
                }
            } catch (err) {
                console.error("Error polling messages", err);
            }
        }

        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = messageInput.value.trim();
            if (!body) return;

            messageInput.value = '';
            messageInput.style.height = 'auto';
            document.getElementById('send-button').disabled = true;

            try {
                const formData = new URLSearchParams();
                formData.append('body', body);

                const res = await fetch(`/api/messages/${itemId}/${otherUserId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData.toString()
                });
                
                if (res.ok) {
                    await fetchMessages(); // Immediate fetch on success
                } else {
                    console.error("Failed to send");
                }
            } catch (err) {
                console.error("Error sending", err);
            }
        });

        function scrollToBottom() {
            container.scrollTop = container.scrollHeight;
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        // Start polling immediately and then every 2s
        fetchMessages();
        setInterval(fetchMessages, 2000);

        // Theme toggle
        const themeToggleBtn = document.getElementById('theme-toggle');
        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    </script>
</body>
</html>
